<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProspectSignal v2 — AI Petroleum Geology Intelligence</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23e8a838'/><text x='50%' y='55%' text-anchor='middle' dominant-baseline='middle' font-size='20' font-weight='900' fill='%230a0e14'>P</text></svg>" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0e14; --bg-card: #111820; --bg-input: #0d1219;
      --border: #1a2332; --border-hover: #2a3a4f;
      --accent: #e8a838; --accent-dim: rgba(232,168,56,0.15);
      --green: #34d399; --red: #f87171; --blue: #60a5fa;
      --purple: #c084fc; --cyan: #22d3ee;
      --text: #e2e8f0; --text-dim: #64748b; --text-muted: #475569;
      --font-mono: 'JetBrains Mono', monospace;
      --font-sans: 'IBM Plex Sans', -apple-system, sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font-sans); min-height: 100vh; }
    
    /* Leaflet dark theme overrides */
    .leaflet-control-zoom a {
      background: rgba(10,14,20,0.92) !important; color: var(--text) !important;
      border-color: var(--border) !important; font-family: var(--font-mono) !important;
    }
    .leaflet-control-zoom a:hover { background: var(--bg-card) !important; color: var(--accent) !important; }
    .leaflet-control-scale-line {
      background: rgba(10,14,20,0.85) !important; color: var(--text-dim) !important;
      border-color: var(--text-dim) !important; font-family: var(--font-mono) !important; font-size: 10px !important;
    }
    .leaflet-control-attribution {
      background: rgba(10,14,20,0.7) !important; color: var(--text-muted) !important;
      font-family: var(--font-mono) !important; font-size: 9px !important;
    }
    .leaflet-control-attribution a { color: var(--text-dim) !important; }
    .prospect-tooltip {
      background: rgba(10,14,20,0.96) !important; border: 1px solid var(--border) !important;
      border-radius: 6px !important; padding: 8px 12px !important; color: var(--text) !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important; font-family: var(--font-mono) !important;
    }
    .prospect-tooltip .leaflet-tooltip-tip { display: none !important; }
    .leaflet-popup-content-wrapper {
      background: rgba(10,14,20,0.96) !important; color: var(--text) !important;
      border: 1px solid var(--border) !important; border-radius: 8px !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important;
    }
    .leaflet-popup-tip { background: rgba(10,14,20,0.96) !important; border: 1px solid var(--border) !important; }
    .leaflet-popup-close-button { color: var(--text-dim) !important; }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    
    /* Layout */
    .header { background: linear-gradient(180deg, rgba(232,168,56,0.06) 0%, transparent 100%); border-bottom: 1px solid var(--border); padding: 14px 20px; }
    .header-inner { display: flex; justify-content: space-between; align-items: center; }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { width: 34px; height: 34px; border-radius: 7px; background: linear-gradient(135deg, var(--accent), #c97b1c); display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 900; color: var(--bg); font-family: var(--font-mono); }
    .logo-text { font-size: 17px; font-weight: 700; letter-spacing: -0.5px; }
    .logo-sub { font-size: 9px; color: var(--text-dim); font-family: var(--font-mono); letter-spacing: 2px; text-transform: uppercase; }
    
    select { background: var(--bg-input); border: 1px solid var(--border); color: var(--accent); padding: 7px 10px; border-radius: 6px; font-size: 12px; font-family: var(--font-mono); cursor: pointer; outline: none; }
    select:focus { border-color: var(--accent); }
    
    .tabs { display: flex; gap: 4px; margin-top: 14px; overflow-x: auto; }
    .tab-btn { background: transparent; border: 1px solid transparent; color: var(--text-dim); padding: 7px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--font-mono); transition: all 0.2s; white-space: nowrap; }
    .tab-btn.active { border-color: currentColor; }
    
    .stats-bar { display: flex; gap: 10px; padding: 14px 20px; overflow-x: auto; }
    .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; flex: 1; min-width: 130px; }
    .stat-label { font-size: 10px; color: var(--text-dim); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
    .stat-value { font-size: 20px; font-weight: 700; font-family: var(--font-mono); }
    .stat-unit { font-size: 11px; color: var(--text-dim); margin-left: 3px; }
    .stat-sub { font-size: 10px; color: var(--text-muted); margin-top: 3px; font-family: var(--font-mono); }
    
    .main { padding: 0 20px 20px; }
    .pill { background: transparent; border: 1px solid var(--border); color: var(--text-dim); padding: 5px 12px; border-radius: 6px; font-size: 11px; font-family: var(--font-mono); cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .pill.active { border-color: currentColor; }
    
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
    .flex { display: flex; }
    .gap-12 { gap: 12px; }
    .gap-16 { gap: 16px; }
    .flex-1 { flex: 1; min-width: 0; }
    .flex-wrap { flex-wrap: wrap; }
    
    /* Map */
    #map-container { width: 100%; height: 500px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); position: relative; }
    #well-map { width: 100%; height: 100%; background: #080c12; }
    .map-overlay { position: absolute; z-index: 1000; }
    .map-style-switcher { top: 10px; left: 10px; background: rgba(10,14,20,0.92); padding: 5px; border-radius: 6px; border: 1px solid var(--border); display: flex; gap: 3px; flex-wrap: wrap; max-width: 380px; }
    .map-style-btn { background: transparent; border: 1px solid transparent; color: var(--text-dim); padding: 4px 8px; border-radius: 4px; font-size: 9px; font-weight: 600; cursor: pointer; font-family: var(--font-mono); transition: all 0.15s; }
    .map-style-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
    .map-legend { bottom: 30px; left: 10px; background: rgba(10,14,20,0.92); padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border); }
    .map-legend-item { display: flex; align-items: center; gap: 7px; margin-bottom: 3px; font-size: 10px; color: var(--text-dim); font-family: var(--font-mono); }
    .map-legend-dot { width: 9px; height: 9px; border-radius: 50%; }
    .map-well-count { top: 10px; right: 50px; background: rgba(10,14,20,0.92); padding: 5px 10px; border-radius: 4px; border: 1px solid var(--border); font-size: 10px; font-family: var(--font-mono); color: var(--text-dim); }
    
    /* Well detail */
    .well-detail { width: 400px; max-height: calc(100vh - 200px); overflow-y: auto; }
    .well-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
    .accordion { border-top: 1px solid var(--border); margin-top: 10px; }
    .accordion-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; cursor: pointer; user-select: none; }
    .accordion-header:hover { opacity: 0.8; }
    .accordion-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; font-family: var(--font-mono); }
    .accordion-arrow { font-size: 10px; color: var(--text-dim); transition: transform 0.2s; }
    .accordion-body { display: none; padding-bottom: 8px; }
    .accordion-body.open { display: block; }
    
    /* Compare mode */
    .compare-bar { background: linear-gradient(180deg, rgba(96,165,250,0.08) 0%, rgba(96,165,250,0.03) 100%); border: 1px solid rgba(96,165,250,0.25); border-radius: 8px; padding: 10px 14px; margin-top: 10px; }
    .compare-well-chip { display: inline-flex; align-items: center; gap: 6px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; font-size: 10px; font-family: var(--font-mono); margin-right: 6px; margin-bottom: 4px; }
    .compare-well-chip .remove { cursor: pointer; color: var(--text-muted); font-size: 12px; margin-left: 4px; }
    .compare-well-chip .remove:hover { color: var(--red); }
    .compare-grid { display: grid; gap: 10px; margin-top: 10px; }
    .compare-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
    .compare-tray { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); z-index: 1001; background: rgba(10,14,20,0.95); border: 1px solid var(--blue); border-radius: 8px; padding: 8px 12px; display: flex; align-items: center; gap: 8px; max-width: 90%; backdrop-filter: blur(8px); }
    .compare-tray-chip { display: flex; align-items: center; gap: 5px; background: rgba(96,165,250,0.12); border: 1px solid rgba(96,165,250,0.3); border-radius: 5px; padding: 4px 8px; font-size: 9px; font-family: var(--font-mono); color: var(--text); white-space: nowrap; }
    .compare-tray-chip .num { color: var(--blue); font-weight: 700; }
    .compare-tray-chip .x { cursor: pointer; color: var(--text-muted); margin-left: 4px; font-size: 11px; }
    .compare-tray-chip .x:hover { color: var(--red); }
    .well-field-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-family: var(--font-mono); }
    .well-field-value { font-size: 12px; font-weight: 600; font-family: var(--font-mono); color: var(--text); }
    
    /* Decline chart */
    .chart-svg { display: block; width: 100%; }
    
    /* Risk slider */
    .risk-bar { display: flex; gap: 3px; }
    .risk-segment { flex: 1; height: 8px; border-radius: 4px; border: none; cursor: pointer; transition: all 0.2s; }
    
    /* Economics */
    input[type="range"] { width: 100%; accent-color: var(--accent); }
    input[type="number"] { background: var(--bg-input); border: 1px solid var(--border); color: var(--text); padding: 5px 7px; border-radius: 4px; font-size: 11px; font-family: var(--font-mono); outline: none; width: 100%; }
    input[type="number"]:focus { border-color: var(--accent); }
    input[type="text"] { background: var(--bg-input); border: 1px solid var(--border); color: var(--text); padding: 5px 8px; border-radius: 4px; font-size: 10px; font-family: var(--font-mono); outline: none; }
    input[type="text"]:focus { border-color: var(--accent); }
    
    .btn { border: none; padding: 10px 18px; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: var(--font-mono); transition: all 0.2s; }
    .btn:hover { filter: brightness(1.1); }
    .btn-primary { background: linear-gradient(135deg, var(--blue), var(--purple)); color: #fff; }
    .btn-cyan { background: linear-gradient(135deg, var(--cyan), var(--blue)); color: #fff; }
    
    /* AI output */
    .ai-output { background: var(--bg-input); border: 1px solid var(--border); border-radius: 6px; padding: 14px; font-size: 12px; line-height: 1.7; color: var(--text); font-family: var(--font-mono); white-space: pre-wrap; max-height: 420px; overflow-y: auto; }
    
    .hidden { display: none; }
    
    /* Responsive */
    @media (max-width: 900px) {
      .stats-bar { flex-wrap: wrap; }
      .stat-card { min-width: 100px; }
      .well-detail { width: 100%; max-height: none; margin-top: 12px; overflow-y: visible; }
      .flex.gap-16 { flex-direction: column; }
      #map-container { height: 400px; }
      .header-inner { flex-wrap: wrap; gap: 8px; }
      .tabs { gap: 2px; }
      .tab-btn { padding: 6px 10px; font-size: 11px; }
    }
    @media (max-width: 600px) {
      .stats-bar { padding: 10px 12px; gap: 6px; }
      .stat-card { min-width: 80px; padding: 8px 10px; }
      .stat-value { font-size: 16px; }
      .main { padding: 0 12px 12px; }
      #map-container { height: 320px; }
      .map-style-switcher { max-width: 280px; }
    }
  </style>
</head>
<body>

<!-- ============ HEADER ============ -->
<div class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">P</div>
      <div>
        <div class="logo-text"><span style="color:var(--accent)">Prospect</span>Signal</div>
        <div class="logo-sub">AI Petroleum Geology Intelligence</div>
      </div>
    </div>
    <select id="basin-select" onchange="setBasin(this.value)">
      <option value="N. Central TX (Wichita Falls)" selected>N. Central TX (Wichita Falls)</option>
      <option value="Permian Basin">Permian Basin</option>
      <option value="Eagle Ford Shale">Eagle Ford Shale</option>
      <option value="Barnett Shale">Barnett Shale</option>
      <option value="Haynesville Shale">Haynesville Shale</option>
      <option value="Anadarko Basin">Anadarko Basin</option>
      <option value="Gulf Coast Basin">Gulf Coast Basin</option>
    </select>
  </div>
  <div class="tabs" id="tabs"></div>
</div>

<!-- ============ STATS BAR ============ -->
<div class="stats-bar" id="stats-bar"></div>

<!-- ============ MAIN CONTENT ============ -->
<div class="main" id="main-content"></div>

<script>
// ============================================================
// PROSPECT SIGNAL — Core Engine
// ============================================================

// Basin data
const TX_BASINS = {
  "N. Central TX (Wichita Falls)": { center: [-98.75, 33.75], zoom: 9, formations: ["Cisco Sand","Strawn Sand","Canyon Lime","Caddo Lime","Wichita-Albany","Gunsight Lime","Bend Conglomerate","Ellenburger"], avgDepth: "700-5,500 ft", primaryProduct: "Oil (conventional)", desc: "Wichita Falls–Electra–Burkburnett–Seymour trend. Shallow conventional production from Pennsylvanian/Permian anticlinal traps. Historic fields: Electra (1911), Burkburnett (1918), KMA. Cisco sands at 700-1,900 ft, Strawn sands at 3,500-5,500 ft, Canyon reef buildups." },
  "Permian Basin": { center: [-102.5, 31.8], zoom: 8, formations: ["Wolfcamp","Bone Spring","Spraberry","Delaware","San Andres","Yeso","Clear Fork","Abo"], avgDepth: "6,000-12,000 ft", primaryProduct: "Oil & Gas" },
  "Eagle Ford Shale": { center: [-98.5, 28.8], zoom: 8, formations: ["Eagle Ford","Austin Chalk","Buda Limestone","Georgetown"], avgDepth: "4,000-14,000 ft", primaryProduct: "Oil, Condensate & Gas" },
  "Barnett Shale": { center: [-97.5, 32.8], zoom: 9, formations: ["Barnett","Marble Falls","Viola-Simpson","Ellenburger"], avgDepth: "6,500-8,500 ft", primaryProduct: "Gas & Condensate" },
  "Haynesville Shale": { center: [-94.2, 32.3], zoom: 8, formations: ["Haynesville","Bossier","Cotton Valley","Travis Peak"], avgDepth: "10,500-13,500 ft", primaryProduct: "Dry Gas" },
  "Anadarko Basin": { center: [-99.5, 35.8], zoom: 8, formations: ["Granite Wash","Cleveland","Tonkawa","Marmaton","Hunton"], avgDepth: "8,000-25,000 ft", primaryProduct: "Oil & Gas" },
  "Gulf Coast Basin": { center: [-95.5, 29.5], zoom: 8, formations: ["Frio","Vicksburg","Wilcox","Yegua-Jackson","Miocene"], avgDepth: "6,000-18,000 ft", primaryProduct: "Oil & Gas" },
};

const MAP_STYLES = {
  satellite: { label: "Satellite", url: "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", attr: "Esri, Maxar", maxZoom: 19 },
  topo: { label: "Topo", url: "https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png", attr: "OpenTopoMap", maxZoom: 17 },
  streets: { label: "Streets", url: "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", attr: "OSM", maxZoom: 19 },
  dark: { label: "Dark", url: "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", attr: "CARTO", maxZoom: 20 },
};

const TABS = [
  { id: "map", label: "⊕ Well Map", color: "var(--green)" },
  { id: "formations", label: "▤ Formations", color: "var(--accent)" },
  { id: "decline", label: "⟋ Decline", color: "var(--accent)" },
  { id: "risk", label: "◈ Risk Matrix", color: "var(--purple)" },
  { id: "economics", label: "$ Economics", color: "var(--blue)" },
  { id: "ai", label: "◉ AI Evaluator", color: "var(--cyan)" },
];

const RISK_CATS = [
  { key: "source", label: "Source Rock", desc: "Maturity, TOC, kerogen type" },
  { key: "reservoir", label: "Reservoir Quality", desc: "Porosity, permeability, thickness" },
  { key: "trap", label: "Trap Integrity", desc: "Structural/stratigraphic closure" },
  { key: "seal", label: "Seal Effectiveness", desc: "Caprock continuity, fault seal" },
  { key: "timing", label: "Timing & Migration", desc: "Charge timing vs. trap formation" },
];

// ============ SUPABASE DATA LAYER ============
const SUPABASE_URL = "https://opitzhcfaoommcsjhcwo.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9waXR6aGNmYW9vbW1jc2poY3dvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNjE3NzQsImV4cCI6MjA4ODgzNzc3NH0.hOYves6YRHkewh5bdK-O9hzXKyb8RmXaVmn_snPJSEQ";
const AI_PROXY_URL = "https://prospect-signal-api-production.up.railway.app/api/ai";
let supabaseClient = null;
let dataSource = "synthetic"; // "supabase" | "synthetic"

async function initSupabase() {
  try {
    if (typeof supabase !== "undefined" && supabase.createClient) {
      supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      // Test connection — check if ps_wells table exists and has data
      const { count, error } = await supabaseClient
        .from("ps_wells")
        .select("*", { count: "exact", head: true });
      if (!error && count > 0) {
        dataSource = "supabase";
        console.log(`✅ Supabase connected: ${count} wells in DB`);
        return true;
      } else {
        console.log("⚠️ Supabase tables empty or missing — using synthetic data");
        dataSource = "synthetic";
        return false;
      }
    }
  } catch (e) {
    console.log("⚠️ Supabase unavailable:", e.message);
  }
  dataSource = "synthetic";
  return false;
}

async function loadSupabaseWells(basin) {
  if (!supabaseClient || dataSource !== "supabase") return null;
  
  const isNCTX = basin.startsWith("N. Central");
  if (!isNCTX) return null;
  
  const targetCounties = ["ARCHER","BAYLOR","CLAY","FOARD","HARDEMAN","JACK","KNOX","MONTAGUE","WICHITA","WILBARGER","YOUNG","THROCKMORTON"];
  // Include District 09, 7B (PDQ data) AND NULL district (SODA API wells)
  // Exclude District 13 (Permian Basin contamination) and other non-NCTX districts
  
  let allData = [];
  let offset = 0;
  const pageSize = 10000;
  const loadAll = state.showAllWells || false;
  
  while (true) {
    let query = supabaseClient
      .from("ps_wells")
      .select("*")
      .in("county_name", targetCounties)
      .or("district.in.(09,9,7B),district.is.null")
      .not("latitude", "is", null);
    
    if (!loadAll) {
      query = query.gt("cum_oil", 0);
    }
    
    const { data, error } = await query.range(offset, offset + pageSize - 1);
    if (error || !data || data.length === 0) break;
    allData = allData.concat(data);
    if (data.length < pageSize) break;
    offset += pageSize;
  }
  
  if (allData.length === 0) return null;
  console.log(`Loaded ${allData.length} wells from Supabase (NCTX Districts 09/7B + SODA wells)`);
  
  return allData.map(w => {
    const statusMap = { "ACTIVE": "producing", "INACTIVE": "shut-in", "PLUGGED": "plugged", "SHUT-IN": "shut-in", "NEW": "producing" };
    const ipRaw = parseFloat(w.ip_oil) || 0;
    const cumRaw = parseFloat(w.cum_oil) || 0;
    // Extract formation from field_name parenthetical: "FENNELL (CISCO REEF)" -> "Cisco Reef"
    let formation = w.formation || "Unknown";
    if (formation === "Unknown" && w.field_name) {
      const parenMatch = w.field_name.match(/\(([^)]+)\)/);
      formation = parenMatch ? parenMatch[1].replace(/,?\s*(UP\.|LO\.|MID\.|UPPER|LOWER|MIDDLE)/gi, '').trim() : w.field_name;
      formation = formation.replace(/\w\S*/g, t => t.charAt(0).toUpperCase() + t.substr(1).toLowerCase());
    }
    return {
      id: w.api_number,
      lng: parseFloat(w.longitude) || -98.75 + (Math.random() - 0.5) * 0.5,
      lat: parseFloat(w.latitude) || 33.75 + (Math.random() - 0.5) * 0.3,
      status: statusMap[w.well_status] || "shut-in",
      formation: formation,
      fieldName: w.field_name || "Unknown",
      ip: ipRaw > 0 ? Math.round(ipRaw / 30) : 0,
      depth: w.total_depth || 0,
      year: w.completion_date ? new Date(w.completion_date).getFullYear() : (w.last_prod_year || 0),
      operator: w.operator_name || "Unknown",
      county: w.county_name || "Unknown",
      cumOil: cumRaw,
      months: [],
      decline: 0,

      leaseNumber: w.lease_number,
      rrcLeaseId: w.rrc_lease_id,

      district: w.district,
      cumGas: parseFloat(w.cum_gas) || 0,
      lastProdYear: w.last_prod_year || 0,
      isReal: true,
    };
  });
}

async function loadSupabaseProduction(leaseNumber, wellType) {
  if (!supabaseClient || dataSource !== "supabase" || !leaseNumber) return null;
  
  const { data, error } = await supabaseClient
    .from("ps_production_monthly")
    .select("*")
    .eq("lease_number", leaseNumber)
    .in("district", ["09","9","7B"])
    .order("report_year", { ascending: true })
    .order("report_month", { ascending: true });
  
  if (error || !data) return null;
  return data;
}

// Enrich well with production data from Supabase
async function enrichWellWithProduction(well) {
  if (!well.leaseNumber) return well;
  
  const prod = await loadSupabaseProduction(well.leaseNumber, well.well_type);
  if (!prod || prod.length === 0) return well;
  
  // Calculate IP (first month oil production)
  const firstProd = prod.find(p => p.oil_bbls > 0);
  if (firstProd) {
    const days = firstProd.days_produced || 30;
    well.ip = Math.round(firstProd.oil_bbls / days);
  }
  
  // Build monthly production array
  well.months = prod.slice(-60).map(p => Math.round(p.oil_bbls || 0));
  
  // Cumulative oil
  well.cumOil = prod.reduce((sum, p) => sum + (p.oil_bbls || 0), 0);
  
  // Estimate decline from last 24 months
  const recent = prod.slice(-24);
  if (recent.length >= 12) {
    const firstHalf = recent.slice(0, 12).reduce((s, p) => s + (p.oil_bbls || 0), 0) / 12;
    const secondHalf = recent.slice(-12).reduce((s, p) => s + (p.oil_bbls || 0), 0) / 12;
    if (firstHalf > 0) {
      well.decline = Math.max(0, (firstHalf - secondHalf) / firstHalf);
    }
  }
  
  return well;
}

function generateWells(basin, count = 100) {
  const info = TX_BASINS[basin];
  if (!info) return [];
  const wells = [];
  const isNCTX = basin.startsWith("N. Central");
  
  // North Central TX gets local operators and realistic shallow conventional parameters
  const operators = isNCTX 
    ? ["Waggoner Ranch","BJOper.","Red River Res.","Bridwell Oil","Kadane & Sons","Perkins-Prothro","TXO Prod.","Graham Royalty","Petrolia Energy","Maguire Oil","TXOG","Texhoma","Pan American","Clayco Oil"]
    : ["Pioneer","Diamondback","ConocoPhillips","Devon","EOG","Oxy","Chevron","Apache","Marathon","Coterra"];
  
  const counties = {
    "N. Central TX (Wichita Falls)": ["Wichita","Clay","Archer","Baylor","Young","Wilbarger","Throckmorton","Jack","Foard","Knox","Hardeman","Montague"],
    "Permian Basin": ["Midland","Martin","Howard","Loving","Reeves","Ward","Ector","Andrews","Pecos","Upton"],
    "Eagle Ford Shale": ["Webb","La Salle","Dimmit","McMullen","Karnes","DeWitt","Gonzales","Frio"],
    "Barnett Shale": ["Tarrant","Johnson","Wise","Denton","Parker","Hood","Jack","Palo Pinto"],
    "Haynesville Shale": ["Panola","Harrison","Rusk","Shelby","San Augustine","Sabine"],
    "Anadarko Basin": ["Canadian","Washita","Custer","Roger Mills","Beckham","Blaine"],
    "Gulf Coast Basin": ["Nueces","San Patricio","Refugio","Victoria","Jackson","Matagorda","Wharton"],
  };
  const cntyList = counties[basin] || ["Unknown"];

  // For N Central TX: cluster wells around known field areas
  const nctxClusters = [
    { name: "Electra", lng: -98.92, lat: 34.03, r: 0.12, weight: 3 },
    { name: "Burkburnett", lng: -98.57, lat: 34.10, r: 0.08, weight: 2 },
    { name: "KMA (Kamay)", lng: -98.84, lat: 33.87, r: 0.10, weight: 2 },
    { name: "Iowa Park", lng: -98.67, lat: 33.95, r: 0.06, weight: 1 },
    { name: "Petrolia", lng: -98.23, lat: 33.84, r: 0.10, weight: 2 },
    { name: "Seymour", lng: -99.26, lat: 33.59, r: 0.15, weight: 2 },
    { name: "Archer City", lng: -98.63, lat: 33.60, r: 0.12, weight: 2 },
    { name: "Olney", lng: -98.75, lat: 33.37, r: 0.10, weight: 1 },
    { name: "Graham", lng: -98.68, lat: 33.11, r: 0.12, weight: 1 },
    { name: "Newcastle", lng: -98.74, lat: 33.20, r: 0.08, weight: 1 },
    { name: "Megargel", lng: -98.93, lat: 33.45, r: 0.08, weight: 1 },
    { name: "Henrietta", lng: -98.19, lat: 33.82, r: 0.08, weight: 1 },
    { name: "Vernon/Wilbarger", lng: -99.30, lat: 34.15, r: 0.12, weight: 1 },
    { name: "Jacksboro", lng: -98.16, lat: 33.22, r: 0.08, weight: 1 },
  ];

  // N Central TX: generate more wells (it's a dense, mature province)
  const wellCount = isNCTX ? 200 : count;

  for (let i = 0; i < wellCount; i++) {
    let lng, lat;
    if (isNCTX) {
      // Pick a cluster weighted by importance
      const totalWeight = nctxClusters.reduce((s, c) => s + c.weight, 0);
      let r = Math.random() * totalWeight;
      let cluster = nctxClusters[0];
      for (const c of nctxClusters) { r -= c.weight; if (r <= 0) { cluster = c; break; } }
      // Gaussian-ish distribution around cluster center
      const angle = Math.random() * Math.PI * 2;
      const dist = cluster.r * Math.sqrt(-2 * Math.log(Math.max(Math.random(), 0.01)));
      lng = cluster.lng + dist * Math.cos(angle);
      lat = cluster.lat + dist * Math.sin(angle) * 0.8;
    } else {
      lng = info.center[0] + (Math.random() - 0.5) * 1.8;
      lat = info.center[1] + (Math.random() - 0.5) * 1.2;
    }
    
    // N Central TX: mostly mature/stripper wells, shallow, low IP
    const status = isNCTX 
      ? (Math.random() > 0.10 ? (Math.random() > 0.45 ? "producing" : "shut-in") : "plugged")
      : (Math.random() > 0.18 ? (Math.random() > 0.28 ? "producing" : "shut-in") : "plugged");
    
    const formation = info.formations[Math.floor(Math.random() * info.formations.length)];
    
    // Realistic parameters by basin
    const ip = isNCTX ? Math.round(8 + Math.random() * 180) : Math.round(80 + Math.random() * 1600);
    const depth = isNCTX 
      ? (formation.includes("Cisco") ? Math.round(700 + Math.random() * 1200) : formation.includes("Strawn") ? Math.round(3500 + Math.random() * 2000) : formation.includes("Canyon") ? Math.round(3000 + Math.random() * 1800) : formation.includes("Ellenburger") ? Math.round(4500 + Math.random() * 1500) : Math.round(800 + Math.random() * 3000))
      : Math.round(4000 + Math.random() * 12000);
    const year = isNCTX ? (Math.random() > 0.6 ? 1950 + Math.floor(Math.random() * 50) : 2000 + Math.floor(Math.random() * 26)) : 2004 + Math.floor(Math.random() * 22);
    const operator = operators[Math.floor(Math.random() * operators.length)];
    const county = cntyList[Math.floor(Math.random() * cntyList.length)];
    const cumOil = Math.round(ip * (20 + Math.random() * (isNCTX ? 600 : 350)));
    const decline = isNCTX ? 0.02 + Math.random() * 0.08 : 0.04 + Math.random() * 0.16;
    const months = Array.from({length: 60}, (_, m) => Math.round(ip * Math.exp(-decline * m / 12) * 30));

    wells.push({
      id: `42-${String(Math.floor(Math.random() * 499)+1).padStart(3,"0")}-${String(i).padStart(5,"0")}`,
      lng, lat, status, formation, ip, depth, year, operator, county, cumOil, months, decline,
      lease: `${operator} ${formation.split(" ")[0]} ${String.fromCharCode(65+Math.floor(Math.random()*8))} #${Math.floor(Math.random()*50)+1}`,
    });
  }
  return wells;
}

function filteredWells() {
  return state.wells.filter(w => {
    if (state.filterStatus !== "all" && w.status !== state.filterStatus) return false;
    if (state.filterFormation !== "all" && w.formation !== state.filterFormation) return false;
    if (state.filterOperator !== "all" && w.operator !== state.filterOperator) return false;
    if (state.filterCounty !== "all" && w.county !== state.filterCounty) return false;
    if (state.filterDepth !== "all") {
      const d = w.depth || 0;
      if (state.filterDepth === "0-1500" && (d < 0 || d > 1500)) return false;
      if (state.filterDepth === "1500-3500" && (d < 1500 || d > 3500)) return false;
      if (state.filterDepth === "3500-5500" && (d < 3500 || d > 5500)) return false;
      if (state.filterDepth === "5500+" && d < 5500) return false;
    }
    return true;
  });
}

// ============ MONTE CARLO ============
function runMonteCarlo() {
  const p = state.econParams;
  const results = [];
  const iterations = 5000;
  
  for (let i = 0; i < iterations; i++) {
    const ip = p.ipMin + Math.random() * (p.ipMax - p.ipMin);
    const decline = 0.3 + Math.random() * 0.5;
    const eur = p.eurMin + Math.random() * (p.eurMax - p.eurMin);
    const price = p.oilPrice * (0.7 + Math.random() * 0.6);
    
    let npv = -p.wellCost, cumProd = 0, cumCash = -p.wellCost, payout = null;
    for (let m = 1; m <= 360; m++) {
      const rate = ip * Math.exp(-decline * m / 12);
      if (rate < 5) break;
      const mp = rate * 30;
      cumProd += mp;
      if (cumProd > eur * 1000) break;
      const net = mp * price * (1 - p.royalty) * (1 - p.tax) - p.opex * 30;
      npv += net / Math.pow(1 + p.discountRate / 12, m);
      cumCash += net;
      if (payout === null && cumCash >= 0) payout = m;
    }
    results.push({ npv, payout, eur: cumProd / 1000 });
  }
  
  results.sort((a, b) => a.npv - b.npv);
  state.mcResults = {
    p10: results[Math.floor(iterations * 0.1)],
    p50: results[Math.floor(iterations * 0.5)],
    p90: results[Math.floor(iterations * 0.9)],
    mean: { npv: results.reduce((s, r) => s + r.npv, 0) / iterations, payout: results.filter(r => r.payout).reduce((s, r, _, a) => s + r.payout / a.length, 0), eur: results.reduce((s, r) => s + r.eur, 0) / iterations },
    posNPV: results.filter(r => r.npv > 0).length / iterations * 100,
    dist: results.map(r => r.npv),
  };
  render();
}

    const info = TX_BASINS[b];
    map.setView([info.center[1], info.center[0]], info.zoom || 8);
    renderMarkers();
  }
}

function setTab(id) { state.activeTab = id; render(); if (id === "map" && !map) setTimeout(initMap, 50); }

function render() {
  const info = TX_BASINS[state.basin];
  const wells = filteredWells();
  const producing = wells.filter(w => w.status === "producing").length;
  const avgIP = wells.length > 0 ? Math.round(wells.reduce((s, w) => s + w.ip, 0) / wells.length) : 0;
  const cumOil = wells.reduce((s, w) => s + w.cumOil, 0);
  const g = gcs();
  const dataFreshnessLabel = state.lastRefreshDate 
    ? `Updated ${state.lastRefreshDate} · ${state.totalWellCount || wells.length} wells`
    : `TX Railroad Commission · ${wells.length} wells`;
  
  // Tabs
  document.getElementById("tabs").innerHTML = TABS.map(t =>
    `<button class="tab-btn ${state.activeTab === t.id ? 'active' : ''}" style="color:${state.activeTab === t.id ? t.color : ''};${state.activeTab === t.id ? 'background:'+t.color+'18' : ''}" onclick="setTab('${t.id}')">${t.label}</button>`
  ).join("");
  
  // Stats
  document.getElementById("stats-bar").innerHTML = `
    <div class="stat-card"><div class="stat-label">Total Wells</div><div class="stat-value" style="color:var(--text)">${wells.length}</div><div class="stat-sub">${producing} producing</div></div>
    <div class="stat-card"><div class="stat-label">Avg IP</div><div class="stat-value" style="color:var(--green)">${avgIP}<span class="stat-unit">bbl/d</span></div></div>
    <div class="stat-card"><div class="stat-label">Cum Production</div><div class="stat-value" style="color:var(--accent)">${(cumOil/1e6).toFixed(1)}<span class="stat-unit">MMbbl</span></div></div>
    <div class="stat-card"><div class="stat-label">GCS</div><div class="stat-value" style="color:${g>10?'var(--green)':g>3?'var(--accent)':'var(--red)'}">${g.toFixed(1)}<span class="stat-unit">%</span></div><div class="stat-sub">Geological chance of success</div></div>
    <div class="stat-card"><div class="stat-label">Basin</div><div class="stat-value" style="color:var(--blue)">${state.basin.split(" ")[0]}</div><div class="stat-sub">${info.primaryProduct}</div></div>
    <div class="stat-card"><div class="stat-label">Data Source</div><div class="stat-value" style="color:${dataSource==='supabase'?'var(--green)':'var(--text-dim)'}; font-size:14px">${dataSource==='supabase'?'◉ LIVE RRC':'◎ SYNTHETIC'}</div><div class="stat-sub">${dataSource==='supabase'? dataFreshnessLabel :'Demo data'}</div></div>
  `;
  const main = document.getElementById("main-content");
  if (state.activeTab === "map") renderMapTab(main, wells, info);
  else if (state.activeTab === "formations") renderFormationsTab(main);
  else if (state.activeTab === "decline") { autoLoadDCA(); renderDeclineTab(main); }
  else if (state.activeTab === "risk") renderRiskTab(main, info);
  else if (state.activeTab === "economics") renderEconTab(main);
  else if (state.activeTab === "ai") renderAITab(main);
  
  // Re-init map if on map tab
  if (state.activeTab === "map" && document.getElementById("well-map") && !map) {
    setTimeout(initMap, 50);
  } else if (state.activeTab === "map" && map) {
    renderMarkers();
  }
}

// ============ MAP MODES: HEATMAP + OPPORTUNITY + AI PROSPECTS ============

function setMapMode(mode) {
  state.mapMode = mode;
  renderMapLayers();
  // Update mode buttons
  document.querySelectorAll('.map-mode-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
}

function renderMapLayers() {
  if (!map) return;
  
  // Clear existing overlay layers
  if (heatLayer) { map.removeLayer(heatLayer); heatLayer = null; }
  if (prospectPinLayer) { map.removeLayer(prospectPinLayer); prospectPinLayer = null; }
  
  if (state.mapMode === 'wells') {
    // Show marker cluster, hide heatmap
    if (markerGroup && !map.hasLayer(markerGroup)) map.addLayer(markerGroup);
    
  } else if (state.mapMode === 'heatmap') {
    // Production heatmap — intensity = cumulative oil
    if (markerGroup && map.hasLayer(markerGroup)) map.removeLayer(markerGroup);
    
    const heatData = state.wells
      .filter(w => w.cumOil > 0 && w.lat && w.lng)
      .map(w => [w.lat, w.lng, Math.log10(w.cumOil + 1) / 6]); // log scale, normalized
    
    heatLayer = L.heatLayer(heatData, {
      radius: 18,
      blur: 22,
      maxZoom: 13,
      max: 1.0,
      gradient: { 0.0: '#0a0e14', 0.2: '#1a1a6c', 0.4: '#4a1486', 0.5: '#8b1a8a', 0.6: '#c94277', 0.7: '#e8a838', 0.85: '#f0d060', 1.0: '#fffff0' }
    }).addTo(map);
    
  } else if (state.mapMode === 'opportunity') {
    // Opportunity heatmap — score areas by infill/recompletion potential
    if (markerGroup && map.hasLayer(markerGroup)) map.removeLayer(markerGroup);
    
    const oppData = computeOpportunityScores();
    
    heatLayer = L.heatLayer(oppData, {
      radius: 22,
      blur: 28,
      maxZoom: 13,
      max: 1.0,
      gradient: { 0.0: '#0a0e14', 0.15: '#0d3320', 0.3: '#1a6644', 0.5: '#34d399', 0.7: '#60f0c0', 0.85: '#a0ffdd', 1.0: '#ffffff' }
    }).addTo(map);
  }
  
  // Always render AI prospect pins if they exist
  renderProspectPins();
}

function computeOpportunityScores() {
  const wells = state.wells;
  const gridSize = 0.02; // ~1.2 miles at this latitude
  const grid = {};
  
  // Aggregate wells into grid cells
  wells.forEach(w => {
    if (!w.lat || !w.lng) return;
    const gLat = Math.round(w.lat / gridSize) * gridSize;
    const gLng = Math.round(w.lng / gridSize) * gridSize;
    const key = `${gLat.toFixed(3)},${gLng.toFixed(3)}`;
    
    if (!grid[key]) grid[key] = { lat: gLat, lng: gLng, producing: 0, plugged: 0, shutin: 0, totalIp: 0, totalCum: 0, count: 0 };
    grid[key].count++;
    if (w.status === 'producing') { grid[key].producing++; grid[key].totalIp += w.ip; }
    if (w.status === 'plugged') grid[key].plugged++;
    if (w.status === 'shut-in') grid[key].shutin++;
    grid[key].totalCum += w.cumOil;
  });
  
  // Score each cell: high production neighbors + shut-in/plugged wells = opportunity
  return Object.values(grid).map(cell => {
    let score = 0;
    
    // Recompletion signal: plugged/shut-in wells near producers
    if (cell.producing > 0 && (cell.plugged + cell.shutin) > 0) {
      score += 0.4 * Math.min((cell.plugged + cell.shutin) / cell.count, 1);
    }
    
    // Infill signal: high production but relatively few wells (wide spacing)
    const avgIp = cell.producing > 0 ? cell.totalIp / cell.producing : 0;
    if (avgIp > 50 && cell.count < 15) {
      score += 0.3 * Math.min(avgIp / 200, 1);
    }
    
    // Production quality: area with proven production
    if (cell.totalCum > 0) {
      score += 0.3 * Math.min(Math.log10(cell.totalCum + 1) / 6, 1);
    }
    
    return [cell.lat, cell.lng, Math.min(score, 1)];
  }).filter(d => d[2] > 0.05);
}

function toggleProspectFocus() {
  state.prospectFocus = !state.prospectFocus;
  if (!map || !markerGroup) return;
  if (state.prospectFocus) {
    // Hide well clusters, show only prospect pins
    if (map.hasLayer(markerGroup)) map.removeLayer(markerGroup);
    if (heatLayer && map.hasLayer(heatLayer)) map.removeLayer(heatLayer);
    // Zoom to fit all prospect pins
    if (state.aiProspects.length > 0) {
      const bounds = L.latLngBounds(state.aiProspects.map(p => [p.lat, p.lng]));
      map.fitBounds(bounds, { padding: [40, 40] });
    }
  } else {
    // Restore wells
    if (!map.hasLayer(markerGroup)) map.addLayer(markerGroup);

}

async function generateAIProspects() {
  if (state.generatingProspects) return;
  state.generatingProspects = true;
  
  const btn = document.getElementById('ai-prospect-btn');
  if (btn) btn.innerHTML = '⏳ AI Analyzing 24K wells...';
  
  // Build a summary of the well data for the AI
  const wells = state.wells.filter(w => w.cumOil > 0);
  const producing = wells.filter(w => w.status === 'producing' && w.ip > 0);
  const plugged = wells.filter(w => w.status === 'plugged');
  const shutin = wells.filter(w => w.status === 'shut-in');
  
  // Find areas with high production density
  const gridSize = 0.03;
  const grid = {};
  wells.forEach(w => {
    const gLat = Math.round(w.lat / gridSize) * gridSize;
    const gLng = Math.round(w.lng / gridSize) * gridSize;
    const key = `${gLat.toFixed(3)},${gLng.toFixed(3)}`;
    if (!grid[key]) grid[key] = { lat: gLat, lng: gLng, wells: [], producing: 0, plugged: 0, shutin: 0, totalIp: 0, totalCum: 0, formations: {}, operators: {} };
    grid[key].wells.push(w);
    if (w.status === 'producing') { grid[key].producing++; grid[key].totalIp += w.ip; }
    if (w.status === 'plugged') grid[key].plugged++;
    if (w.status === 'shut-in') grid[key].shutin++;
    grid[key].totalCum += w.cumOil;
    if (w.formation && w.formation !== 'Unknown') grid[key].formations[w.formation] = (grid[key].formations[w.formation] || 0) + 1;
    if (w.operator && w.operator !== 'Unknown') grid[key].operators[w.operator] = (grid[key].operators[w.operator] || 0) + 1;
  });
  
  // Score and rank grid cells for prospect potential
  const scoredCells = Object.values(grid)
    .map(cell => {
      let score = 0;
      const avgIp = cell.producing > 0 ? cell.totalIp / cell.producing : 0;
      
      // High production quality
      score += Math.min(avgIp / 100, 1) * 30;
      // Recompletion potential
      if (cell.producing > 0 && (cell.plugged + cell.shutin) > 0) score += 20;
      // Proven area with room
      if (cell.totalCum > 100000 && cell.wells.length < 20) score += 15;
      // Active operators nearby (institutional validation)
      if (Object.keys(cell.operators).length > 2) score += 10;
      // Multiple formations tested
      if (Object.keys(cell.formations).length > 1) score += 10;
      // Recent production (not depleted)
      const recentWells = cell.wells.filter(w => w.lastProdYear >= 2020);
      if (recentWells.length > 0) score += 15;
      
      return { ...cell, score: Math.round(score), avgIp: Math.round(avgIp), topFormation: Object.entries(cell.formations).sort((a,b)=>b[1]-a[1])[0]?.[0] || 'Unknown', topOperator: Object.entries(cell.operators).sort((a,b)=>b[1]-a[1])[0]?.[0] || 'Unknown' };
    })
    .sort((a, b) => b.score - a.score)
    .slice(0, 25);
  
  // Build prompt for Claude to evaluate top prospects
  const prospectSummary = scoredCells.slice(0, 15).map((c, i) => 
    `Area ${i+1}: ${c.lat.toFixed(3)}°N, ${c.lng.toFixed(3)}°W | ${c.producing} producing, ${c.plugged} plugged, ${c.shutin} shut-in | Avg IP: ${c.avgIp} bbl/d | Cum: ${(c.totalCum/1000).toFixed(0)} MBO | Top formation: ${c.topFormation} | Top operator: ${c.topOperator} | Score: ${c.score}`
  ).join('\n');
  
  const countyStats = {};
  wells.forEach(w => {
    if (!countyStats[w.county]) countyStats[w.county] = { cum: 0, wells: 0 };
    countyStats[w.county].cum += w.cumOil;
    countyStats[w.county].wells++;
  });
  const countyText = Object.entries(countyStats).sort((a,b) => b[1].cum - a[1].cum).map(([c,d]) => `${c}: ${(d.cum/1e6).toFixed(1)} MMbbl, ${d.wells} wells`).join('; ');
  
  const prompt = `You are Dr. ProspectSignal, an expert petroleum geologist analyzing N. Central TX well data for drilling prospects.

BASIN DATA SUMMARY:
- ${wells.length} wells with production data across 12 counties
- ${producing.length} currently producing, ${plugged.length} plugged, ${shutin.length} shut-in
- County production: ${countyText}

TOP 15 PROSPECT AREAS (pre-scored by algorithm):
${prospectSummary}

TASK: Evaluate these areas and select the TOP 10 best drilling/recompletion prospects. For each prospect, provide:
1. A short name (e.g., "Electra Cisco Infill" or "KMA Strawn Recompletion")
2. The prospect type: INFILL, RECOMPLETION, STEP-OUT, or EXTENSION
3. Estimated EUR in MBO (thousand barrels)
4. A 2-3 sentence geological reasoning explaining WHY this is a good prospect
5. A confidence score 0-100

Respond ONLY in this exact JSON format, no other text:
[
  {"name":"...","type":"...","eur":50,"score":75,"reasoning":"...","areaIndex":0},
  ...
]

Where areaIndex is the 0-based index into the TOP 15 areas list above. Select the 10 best.`;

  try {
    const response = await fetch(AI_PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 3000,
        messages: [{ role: 'user', content: prompt }],
      }),
    });
    
    const data = await response.json();
    const aiText = data.content?.[0]?.text || '';
    
    // Parse JSON from AI response
    const jsonMatch = aiText.match(/\[[\s\S]*\]/);
    if (jsonMatch) {
      const prospects = JSON.parse(jsonMatch[0]);
      
      state.aiProspects = prospects.map(p => {
        const area = scoredCells[p.areaIndex] || scoredCells[0];
        return {
          lat: area.lat,
          lng: area.lng,
          name: p.name,
          prospectType: p.type,
          estimatedEur: p.eur,
          score: p.score,
          reasoning: p.reasoning,
          offsetCount: area.wells.length,
          avgOffsetIp: area.avgIp,
        };
      });
      
      renderProspectPins();
      if (btn) btn.innerHTML = `✅ ${state.aiProspects.length} Prospects Found`;
      btn.style.background = 'linear-gradient(135deg, var(--green), #1a8a5a)';
      // Insert prospect results panel without destroying the map
      const dashboard = document.getElementById('basin-dashboard');
      if (dashboard) {
        let prospectPanel = document.getElementById('prospect-results-panel');
        if (!prospectPanel) {
          prospectPanel = document.createElement('div');
          prospectPanel.id = 'prospect-results-panel';
          dashboard.parentElement.insertBefore(prospectPanel, dashboard);
        }
        prospectPanel.innerHTML = renderProspectResultsPanel();
      }
    } else {
      if (btn) btn.innerHTML = '❌ AI response parse error — try again';
    }
  } catch (e) {
    console.error('AI Prospect error:', e);
    if (btn) btn.innerHTML = '❌ Error — check API proxy';
  }
  
  state.generatingProspects = false;
}

function renderDashboardCards(wells) {
  if (!wells || wells.length === 0) return '';

  const hotLeases = activeWells
    .filter(w => w.ip > 0)
    .sort((a, b) => b.ip - a.ip)

  const hotLeasesHtml = hotLeases.map((w, i) => `

    countyMap[w.county].wells++;

    if (w.ip > 0) countyMap[w.county].avgIp.push(w.ip);
  });
  const counties = Object.entries(countyMap)
    .map(([name, d]) => ({ name, ...d, avgIpCalc: d.avgIp.length > 0 ? Math.round(d.avgIp.reduce((s,v)=>s+v,0)/d.avgIp.length) : 0 }))

        <div style="height:100%;width:${(c.cumOil/maxCountyOil*100).toFixed(0)}%;background:linear-gradient(90deg,var(--green),var(--cyan));border-radius:3px"></div>
      </div>
      <span style="font-size:9px;color:var(--text-dim);font-family:var(--font-mono);width:70px;text-align:right">${(c.cumOil/1e6).toFixed(1)} MM</span>
      <span style="font-size:9px;color:var(--text-muted);font-family:var(--font-mono);width:50px;text-align:right">${c.avgIpCalc} IP</span>
    </div>
  `).join('');
  
  // ── CARD 4: Formation/Field Performance ──
  const fmMap = {};
  wells.forEach(w => {
    const fm = w.formation && w.formation !== 'Unknown' ? w.formation : null;
    if (!fm) return;
    // Truncate long field names
    const key = fm.length > 30 ? fm.substring(0, 30) : fm;
    if (!fmMap[key]) fmMap[key] = { cumOil: 0, wells: 0, ips: [], depths: [] };
    fmMap[key].cumOil += w.cumOil;
    fmMap[key].wells++;
    if (w.ip > 0) fmMap[key].ips.push(w.ip);
    if (w.depth > 0) fmMap[key].depths.push(w.depth);
  });
  const formations = Object.entries(fmMap)
    .map(([name, d]) => ({
      name,
      ...d,
      avgIp: d.ips.length > 0 ? Math.round(d.ips.reduce((s,v)=>s+v,0)/d.ips.length) : 0,
      avgDepth: d.depths.length > 0 ? Math.round(d.depths.reduce((s,v)=>s+v,0)/d.depths.length) : 0
    }))
    .sort((a, b) => b.cumOil - a.cumOil)
    .slice(0, 10);
  const maxFmOil = formations[0]?.cumOil || 1;
  
  const fmHtml = formations.map(f => `
    <div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:10px;color:var(--text);font-family:var(--font-mono);width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${f.name}">${f.name}</span>
      <div style="flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${(f.cumOil/maxFmOil*100).toFixed(0)}%;background:var(--purple);border-radius:3px"></div>
      </div>
      <span style="font-size:9px;color:var(--green);font-family:var(--font-mono);width:40px;text-align:right">${f.avgIp} IP</span>
      <span style="font-size:9px;color:var(--text-dim);font-family:var(--font-mono);width:45px;text-align:right">${f.wells} wells</span>
    </div>
  `).join('');
  
  // ── Assemble 4 cards ──
  const cardStyle = 'background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:14px 16px';
  const titleStyle = 'font-size:11px;font-weight:700;color:var(--accent);font-family:var(--font-mono);letter-spacing:0.5px;margin-bottom:10px;text-transform:uppercase';
  const subtitleStyle = 'font-size:9px;color:var(--text-dim);font-family:var(--font-mono);margin-bottom:10px';
  
  return `
    <div style="${cardStyle}">
      <div style="${titleStyle}">🔥 Hottest Leases</div>
      <div style="${subtitleStyle}">Highest IP rate — where oil is flowing now</div>
      ${hotLeasesHtml || '<div style="color:var(--text-dim);font-size:11px">No active production data</div>'}
    </div>
    <div style="${cardStyle}">
      <div style="${titleStyle}">🏢 Top Operators</div>
      <div style="${subtitleStyle}">Ranked by cumulative production — institutional signal</div>
      ${topOpsHtml || '<div style="color:var(--text-dim);font-size:11px">No operator data</div>'}
    </div>
    <div style="${cardStyle}">
      <div style="${titleStyle}">📊 County Breakdown</div>
      <div style="${subtitleStyle}">Production by county — where the oil is</div>
      ${countyHtml || '<div style="color:var(--text-dim);font-size:11px">No county data</div>'}
    </div>
    <div style="${cardStyle}">
      <div style="${titleStyle}">🪨 Field Performance</div>
      <div style="${subtitleStyle}">Which formations produce — avg IP and well count</div>
      ${fmHtml || '<div style="color:var(--text-dim);font-size:11px">No formation data</div>'}
    </div>
  `;
}

function renderDetailPanel() {
  const sw = state.selectedWell;
  const container = document.querySelector(".well-detail");
  if (!container && !sw) return;
  
  const flexParent = document.querySelector("#map-container")?.parentElement?.parentElement;
  if (!flexParent) return;
  
  const existing = flexParent.querySelector(".well-detail");
  if (existing) existing.remove();
  
  if (!sw) return;
  
  const noteText = state.prospectNotes[sw.id] || "";
  const rrcUrl = rrcLink(sw);
  const liveBadge = sw.isReal ? `<span style="display:inline-block;background:var(--green);color:#000;font-size:8px;font-weight:700;padding:2px 6px;border-radius:3px;font-family:var(--font-mono);letter-spacing:1px;margin-left:8px;vertical-align:middle">LIVE RRC</span>` : `<span style="display:inline-block;background:var(--text-muted);color:var(--bg);font-size:8px;font-weight:700;padding:2px 6px;border-radius:3px;font-family:var(--font-mono);letter-spacing:1px;margin-left:8px;vertical-align:middle">SYNTHETIC</span>`;
  
  const g = gcs();
  const rs = state.riskScores;
  const mc = state.mcResults;
  const colors5 = ["#ef4444","#f97316","#eab308","#84cc16","#22c55e"];
  
  // ── DCA mini section ──
  const hasDCA = dcaState.prodData && dcaState.fits && dcaState.fits.length > 0;
  const bestFit = hasDCA ? dcaState.fits[0] : null;
  let dcaMiniChart = "";
  if (hasDCA) {
    const monthlyOil = dcaState.prodData.map(p => p.oil);
    const maxR = Math.max(...monthlyOil) * 1.1;
    const n = monthlyOil.length;
    const cw2 = 360, ch2 = 100, p2 = { t: 8, r: 8, b: 8, l: 8 };
    const w2 = cw2 - p2.l - p2.r, h2 = ch2 - p2.t - p2.b;
    const dots = monthlyOil.map((q, t) => {
      if (q <= 0) return "";
      return `<circle cx="${p2.l + (t/(n-1))*w2}" cy="${p2.t + h2 - (q/maxR)*h2}" r="1.5" fill="#e2e8f0" opacity="0.6" />`;
    }).join("");
    const curvePts = [];
    for (let t = 0; t < n * 1.3; t++) {
      const q = bestFit.predict(t);
      if (q < 1) break;
      curvePts.push(`${p2.l + (t/(n*1.3))*w2},${p2.t + h2 - (Math.min(q,maxR)/maxR)*h2}`);
    }
    dcaMiniChart = `<svg viewBox="0 0 ${cw2} ${ch2}" style="width:100%;display:block;margin:6px 0">${dots}<polyline points="${curvePts.join(" ")}" fill="none" stroke="${bestFit.color}" stroke-width="1.5" /></svg>`;
  }
  
  const dcaSection = `

  // ── Risk mini section ──

      </div>
      <div class="accordion-body" id="risk-body">

    </div>
    <div style="font-size:9px;color:var(--text-muted);font-family:var(--font-mono);margin-bottom:4px">PRODUCTION (${sw.months?.length || 0} mo)</div>
    <svg viewBox="0 0 360 50" style="width:100%;display:block">${miniChartPath(sw.months, 360, 50, "#34d399")}</svg>
    
    ${dcaSection}
    ${riskSection}
    ${econSection}
    ${aiSection}
    
    <div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--border)">
      <div style="font-size:9px;color:var(--text-muted);font-family:var(--font-mono);margin-bottom:4px">NEAREST OFFSETS</div>
      ${offsets.map(w=>`<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:10px;font-family:var(--font-mono);cursor:pointer;border-bottom:1px solid var(--border)" onclick="dcaState.prodData=null;dcaState.fits=null;dcaState.aiAnalysis=null;state.selectedWell=state.wells.find(x=>x.id==='${w.id}');renderDetailPanel()"><span style="color:var(--text)">${w.formation} | ${w.county}</span><span style="color:var(--green)">${w.ip} bbl/d</span></div>`).join("")}
    </div>

      <div style="font-size:9px;color:var(--text-muted);font-family:var(--font-mono);margin-bottom:4px">PROSPECT NOTES</div>

      <button onclick="exportProspectPDF('${sw.id}')" style="flex:2;background:linear-gradient(135deg,var(--accent),#c97b1c);border:none;color:#000;padding:6px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;font-family:var(--font-mono);letter-spacing:0.5px">⬇ PDF REPORT</button>
    </div>
  `;
  flexParent.appendChild(detailDiv);
}

function toggleCompareMode() {
  state.compareMode = !state.compareMode;
  if (!state.compareMode && state.compareWells.length === 0) {
    state.compareResult = null;
  }
  render();
  if (map) renderMarkers();
}

function toggleCompareWell(well) {
  const idx = state.compareWells.findIndex(w => w.id === well.id);
  if (idx >= 0) {
    state.compareWells.splice(idx, 1);
  } else {
    if (state.compareWells.length >= 3) {
      state.compareWells.shift(); // remove oldest if at max
    }
    state.compareWells.push(well);
  }
  state.compareResult = null;
  renderMarkers();
  renderCompareBar();
}

function clearCompare() {
  state.compareWells = [];
  state.compareResult = null;
  state.comparing = false;
  state.compareMode = false;
  renderMarkers();
  renderCompareBar();
  render();
}

function renderCompareBar() {
  // ── Floating tray inside the map ──
  let tray = document.getElementById("compare-tray");
  if (state.compareWells.length === 0) {
    if (tray) tray.remove();
  } else {
    if (!tray) {
      const mapContainer = document.getElementById("map-container");
      if (mapContainer) {
        tray = document.createElement("div");
        tray.id = "compare-tray";
        tray.className = "compare-tray";
        mapContainer.appendChild(tray);
      }
    }
    if (tray) {
      const chips = state.compareWells.map((w, i) => `
        <div class="compare-tray-chip">
          <span class="num">${i + 1}</span>
          <span>${w.lease.substring(0, 18)}</span>
          <span style="color:var(--green)">${w.ip} bbl/d</span>
          <span class="x" onclick="event.stopPropagation();state.compareWells.splice(${i},1);state.compareResult=null;renderMarkers();renderCompareBar()">✕</span>
        </div>
      `).join("");
      const canCompare = state.compareWells.length >= 2;

function miniChartPath(data, w, h, color) {
  if (!data || !data.length) return "";
  const max = Math.max(...data);
  const min = Math.min(...data, 0);
  const range = max - min || 1;
  const pts = data.map((v, i) => `${(i/(data.length-1))*w},${h-((v-min)/range)*h}`).join(" ");
  return `<polygon points="0,${h} ${pts} ${w},${h}" fill="${color}15" /><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" />`;
}

// Curve fitting models
function fitExponential(rates) {
  // q(t) = qi * exp(-Di * t)
  // Linearize: ln(q) = ln(qi) - Di*t
  const n = rates.length;
  if (n < 3) return null;
  let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0, validN = 0;
  rates.forEach((q, t) => {
    if (q <= 0) return;
    const lnQ = Math.log(q);
    sumX += t; sumY += lnQ; sumXY += t * lnQ; sumX2 += t * t; validN++;
  });
  if (validN < 3) return null;
  const slope = (validN * sumXY - sumX * sumY) / (validN * sumX2 - sumX * sumX);
  const intercept = (sumY - slope * sumX) / validN;
  const qi = Math.exp(intercept);
  const Di = -slope; // monthly decline rate
  if (Di <= 0 || qi <= 0) return null;
  const predict = (t) => qi * Math.exp(-Di * t);
  // EUR: integrate to economic limit (5 bbl/mo)
  let eur = 0;
  for (let t = 0; t < 600; t++) { const q = predict(t); if (q < 5) break; eur += q; }
  // R² calculation
  const meanY = rates.filter(q => q > 0).reduce((s, v) => s + Math.log(v), 0) / validN;
  let ssTot = 0, ssRes = 0;
  rates.forEach((q, t) => { if (q <= 0) return; const lnQ = Math.log(q); ssTot += (lnQ - meanY) ** 2; ssRes += (lnQ - (intercept + slope * t)) ** 2; });
  const r2 = 1 - ssRes / (ssTot || 1);
  return { type: "Exponential", qi: Math.round(qi), Di: Di, DiAnnual: (1 - Math.exp(-Di * 12)) * 100, eur: Math.round(eur / 1000), r2, predict, color: "#e8a838" };
}

function fitHyperbolic(rates) {
  // q(t) = qi / (1 + b*Di*t)^(1/b)
  // Try b values from 0.1 to 2.0 and pick best fit
  const n = rates.length;
  if (n < 6) return null;
  let bestFit = null, bestR2 = -Infinity;
  for (let b = 0.1; b <= 2.0; b += 0.1) {
    // For each b, linearize: q^(-b) = qi^(-b) + (b*Di/qi^b)*t ... use numerical approach
    // Simpler: use first and mid-point to estimate qi and Di, then score
    const q0 = rates.find(q => q > 0) || rates[0];
    const midIdx = Math.floor(n / 2);
    const qMid = rates[midIdx] || q0 / 2;
    if (q0 <= 0 || qMid <= 0 || qMid >= q0) continue;
    const ratio = (q0 / qMid);
    const denom = midIdx * b;
    if (denom <= 0) continue;
    const Di = (Math.pow(ratio, b) - 1) / denom;
    if (Di <= 0) continue;
    const qi = q0;
    const predict = (t) => qi / Math.pow(1 + b * Di * t, 1 / b);
    // R²
    const actuals = rates.filter(q => q > 0);
    const meanQ = actuals.reduce((s, v) => s + v, 0) / actuals.length;
    let ssTot = 0, ssRes = 0;
    rates.forEach((q, t) => { if (q <= 0) return; const pred = predict(t); ssTot += (q - meanQ) ** 2; ssRes += (q - pred) ** 2; });
    const r2 = 1 - ssRes / (ssTot || 1);
    if (r2 > bestR2) { bestR2 = r2; bestFit = { type: "Hyperbolic", qi: Math.round(qi), Di, DiAnnual: Di * 12 * 100, b: Math.round(b * 10) / 10, r2, predict, color: "#34d399" }; }
  }
  if (bestFit) {
    let eur = 0;
    for (let t = 0; t < 600; t++) { const q = bestFit.predict(t); if (q < 5) break; eur += q; }
    bestFit.eur = Math.round(eur / 1000);
  }
  return bestFit;
}

function fitHarmonic(rates) {
  // q(t) = qi / (1 + Di*t)  — special case of hyperbolic where b=1
  const n = rates.length;
  if (n < 3) return null;
  const q0 = rates.find(q => q > 0) || rates[0];
  const lastIdx = n - 1;
  const qLast = rates[lastIdx];
  if (q0 <= 0 || qLast <= 0 || qLast >= q0) return null;
  const Di = (q0 / qLast - 1) / lastIdx;
  if (Di <= 0) return null;
  const qi = q0;
  const predict = (t) => qi / (1 + Di * t);
  const actuals = rates.filter(q => q > 0);
  const meanQ = actuals.reduce((s, v) => s + v, 0) / actuals.length;
  let ssTot = 0, ssRes = 0;
  rates.forEach((q, t) => { if (q <= 0) return; const pred = predict(t); ssTot += (q - meanQ) ** 2; ssRes += (q - pred) ** 2; });
  const r2 = 1 - ssRes / (ssTot || 1);
  let eur = 0;
  for (let t = 0; t < 600; t++) { const q = predict(t); if (q < 5) break; eur += q; }
  return { type: "Harmonic", qi: Math.round(qi), Di, DiAnnual: Di * 12 * 100, b: 1.0, r2, predict, eur: Math.round(eur / 1000), color: "#c084fc" };
}

// DCA state
let dcaState = { prodData: null, fits: null, aiAnalysis: null, analyzing: false, typeCurveData: null, generatingTypeCurve: false };

async function loadDCAData(well) {
  if (!well || !well.leaseNumber || dataSource !== "supabase") return null;
  const prod = await loadSupabaseProduction(well.leaseNumber, well.wellType);
  if (!prod || prod.length < 6) return null;
  return prod.map(p => ({
    year: p.report_year,
    month: p.report_month,
    oil: parseFloat(p.oil_bbls) || 0,
    gas: parseFloat(p.gas_mcf) || 0,
    days: p.days_produced || 30,
    rate: (parseFloat(p.oil_bbls) || 0) / (p.days_produced || 30), // daily rate
  }));
}

function runDCAFits(prodData) {
  if (!prodData || prodData.length < 6) return null;
  const monthlyRates = prodData.map(p => p.oil); // monthly bbls
  const fits = [fitExponential(monthlyRates), fitHyperbolic(monthlyRates), fitHarmonic(monthlyRates)].filter(Boolean);
  fits.sort((a, b) => b.r2 - a.r2); // best fit first
  return fits;
}

async function runDCAAnalysis(well, prodData, fits) {
  if (dcaState.analyzing) return;
  dcaState.analyzing = true;
  dcaState.aiAnalysis = null;
  renderDeclineTab(document.getElementById("main-content"));
  
  const bestFit = fits[0];
  const monthlyOil = prodData.map(p => p.oil);
  const firstHalf = monthlyOil.slice(0, Math.floor(monthlyOil.length / 2));
  const secondHalf = monthlyOil.slice(Math.floor(monthlyOil.length / 2));
  const avgFirst = firstHalf.reduce((s, v) => s + v, 0) / firstHalf.length;
  const avgSecond = secondHalf.reduce((s, v) => s + v, 0) / secondHalf.length;
  const trend = avgSecond > avgFirst * 1.1 ? "INCREASING" : avgSecond < avgFirst * 0.7 ? "DECLINING" : "FLAT";
  
  // Check for production anomalies (workovers, waterfloods)
  const spikes = [];
  for (let i = 3; i < monthlyOil.length; i++) {
    const prev3Avg = (monthlyOil[i-1] + monthlyOil[i-2] + monthlyOil[i-3]) / 3;
    if (prev3Avg > 0 && monthlyOil[i] > prev3Avg * 2) {
      spikes.push({ month: i, year: prodData[i].year, mo: prodData[i].month, rate: monthlyOil[i], prevAvg: Math.round(prev3Avg) });
    }
  }
  
  const prompt = `Analyze this well's production decline behavior. Be specific and quantitative.

WELL: ${well.lease} (API# ${well.id})
Formation: ${well.formation} | County: ${well.county} Co. | Operator: ${well.operator}
Depth: ${well.depth?.toLocaleString() || "unknown"} ft | Status: ${well.status}

PRODUCTION DATA: ${prodData.length} months (${prodData[0].year}/${prodData[0].month} to ${prodData[prodData.length-1].year}/${prodData[prodData.length-1].month})
Total cumulative oil: ${Math.round(monthlyOil.reduce((s,v)=>s+v,0)/1000)} MBO
Production trend: ${trend} (first-half avg: ${Math.round(avgFirst)} bbl/mo, second-half avg: ${Math.round(avgSecond)} bbl/mo)
${spikes.length > 0 ? "Production spikes detected at: " + spikes.map(s => `${s.year}/${s.mo} (${s.rate} bbl vs ${s.prevAvg} avg)`).join(", ") : "No major production spikes detected"}

CURVE FITS:
${fits.map(f => `${f.type}: qi=${f.qi} bbl/mo, Di=${f.DiAnnual.toFixed(1)}%/yr${f.b !== undefined ? ', b='+f.b : ''}, EUR=${f.eur} MBO, R²=${f.r2.toFixed(3)}`).join("\n")}
Best fit: ${bestFit.type} (R²=${bestFit.r2.toFixed(3)})

TASKS:
1. Interpret WHY the production behaves this way geologically (waterflood response? natural depletion? workover? formation-specific behavior?)
2. Is the best-fit model appropriate, or does the production pattern suggest something the models can't capture?
3. What are the remaining recoverable reserves based on the decline analysis?
4. Is this well a recompletion or workover candidate? Why or why not?
5. Rate the confidence of the EUR estimate: HIGH / MEDIUM / LOW and explain why.`;

  try {
    const resp = await fetch(AI_PROXY_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1500,
        system: AI_SYSTEM_PROMPT,
        messages: [{ role: "user", content: prompt }],
      }),
    });
    const data = await resp.json();
    dcaState.aiAnalysis = data.content?.filter(c => c.type === "text").map(c => c.text).join("\n") || "Analysis failed.";
  } catch (e) {
    dcaState.aiAnalysis = "Error: " + e.message;
  }
  dcaState.analyzing = false;
  renderDeclineTab(document.getElementById("main-content"));
}

async function generateTypeCurve() {
  if (dcaState.generatingTypeCurve) return;
  dcaState.generatingTypeCurve = true;
  renderDeclineTab(document.getElementById("main-content"));
  
  const well = state.selectedWell;
  const targetFm = well?.formation || "Unknown";
  const targetCounty = well?.county || "Unknown";
  
  // Find all wells with same formation in same county that have production data
  const matchingWells = state.wells.filter(w => 
    w.formation === targetFm && w.county === targetCounty && w.leaseNumber && w.isReal
  ).slice(0, 20); // Cap at 20 for performance
  
  if (matchingWells.length < 3) {
    dcaState.typeCurveData = { error: `Only ${matchingWells.length} wells found for ${targetFm} in ${targetCounty} Co. Need at least 3.` };
    dcaState.generatingTypeCurve = false;
    renderDeclineTab(document.getElementById("main-content"));
    return;
  }
  
  // Load production for each well and normalize to months-from-first-production
  const allCurves = [];
  for (const w of matchingWells.slice(0, 15)) {
    const prod = await loadSupabaseProduction(w.leaseNumber, w.wellType);
    if (!prod || prod.length < 6) continue;
    const oilMonths = prod.map(p => parseFloat(p.oil_bbls) || 0).filter(v => v > 0);
    if (oilMonths.length < 6) continue;
    allCurves.push(oilMonths);
  }
  
  if (allCurves.length < 3) {
    dcaState.typeCurveData = { error: `Only ${allCurves.length} wells had sufficient production data.` };
    dcaState.generatingTypeCurve = false;
    renderDeclineTab(document.getElementById("main-content"));
    return;
  }
  
  // Build P10/P50/P90 type curve (normalize to 60 months max)
  const maxMonths = 60;
  const p10 = [], p50 = [], p90 = [], avg = [];
  for (let m = 0; m < maxMonths; m++) {
    const vals = allCurves.map(c => c[m] || 0).filter(v => v > 0).sort((a, b) => a - b);
    if (vals.length < 2) break;
    p10.push(vals[Math.floor(vals.length * 0.1)] || vals[0]);
    p50.push(vals[Math.floor(vals.length * 0.5)]);
    p90.push(vals[Math.floor(vals.length * 0.9)] || vals[vals.length - 1]);
    avg.push(vals.reduce((s, v) => s + v, 0) / vals.length);
  }
  
  dcaState.typeCurveData = { formation: targetFm, county: targetCounty, wellCount: allCurves.length, p10, p50, p90, avg, months: p50.length };
  dcaState.generatingTypeCurve = false;
  renderDeclineTab(document.getElementById("main-content"));
}
