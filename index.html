function renderDeclineTab(el) {
  const well = state.selectedWell;
  const hasProdData = dcaState.prodData && dcaState.prodData.length > 0;
  const fits = dcaState.fits;
  const bestFit = fits && fits.length > 0 ? fits[0] : null;
  
  // Chart dimensions
  const pad = { t: 20, r: 16, b: 30, l: 55 };
  const cw = 600, ch = 260;
  const w = cw - pad.l - pad.r, h = ch - pad.t - pad.b;
  
  let chartSVG = "";
  let statCards = "";
  
  if (hasProdData && fits && fits.length > 0) {
    const prodData = dcaState.prodData;
    const monthlyOil = prodData.map(p => p.oil);
    const maxRate = Math.max(...monthlyOil) * 1.1;
    const nMonths = monthlyOil.length;
    
    // Grid lines
    const gridSteps = 5;
    let gridSVG = "";
    for (let i = 0; i <= gridSteps; i++) {
      const f = i / gridSteps;
      const y = pad.t + h * (1 - f);
      gridSVG += `<line x1="${pad.l}" y1="${y}" x2="${cw-pad.r}" y2="${y}" stroke="#1a2332" stroke-dasharray="2,4" />`;
      gridSVG += `<text x="${pad.l-6}" y="${y+3}" fill="#64748b" font-size="8" text-anchor="end" font-family="var(--font-mono)">${Math.round(maxRate*f)}</text>`;
    }
    
    // Actual production scatter dots
    const scatterDots = monthlyOil.map((q, t) => {
      if (q <= 0) return "";
      const x = pad.l + (t / (nMonths - 1)) * w;
      const y = pad.t + h - (q / maxRate) * h;
      return `<circle cx="${x}" cy="${y}" r="2.5" fill="#e2e8f0" opacity="0.7" />`;
    }).join("");
    
    // Forecast curves (extend 50% beyond actual data)
    const forecastMonths = Math.floor(nMonths * 1.5);
    const curveSVGs = fits.map(fit => {
      const pts = [];
      for (let t = 0; t < forecastMonths; t++) {
        const q = fit.predict(t);
        if (q < 1 || q > maxRate * 2) continue;
        const x = pad.l + (t / (forecastMonths - 1)) * w;
        const y = pad.t + h - (Math.min(q, maxRate) / maxRate) * h;
        pts.push(`${x},${y}`);
      }
      const dashStyle = fit === bestFit ? "" : 'stroke-dasharray="4,3"';
      const strokeW = fit === bestFit ? "2" : "1.2";
      return `<polyline points="${pts.join(" ")}" fill="none" stroke="${fit.color}" stroke-width="${strokeW}" ${dashStyle} opacity="${fit === bestFit ? 1 : 0.6}" />`;
    }).join("");
    
    // Vertical line separating actual from forecast
    const actualEndX = pad.l + ((nMonths - 1) / (forecastMonths - 1)) * w;
    const forecastLine = `<line x1="${actualEndX}" y1="${pad.t}" x2="${actualEndX}" y2="${pad.t+h}" stroke="var(--text-muted)" stroke-width="0.5" stroke-dasharray="3,3" />
      <text x="${actualEndX+4}" y="${pad.t+10}" fill="var(--text-muted)" font-size="8" font-family="var(--font-mono)">forecast →</text>`;
    
    // Time axis labels
    const firstYear = prodData[0].year;
    const lastYear = prodData[prodData.length - 1].year;
    
    chartSVG = `
      <svg viewBox="0 0 ${cw} ${ch}" class="chart-svg">
        ${gridSVG}
        ${scatterDots}
        ${curveSVGs}
        ${forecastLine}
        <text x="${pad.l}" y="${ch-4}" fill="#64748b" font-size="8" font-family="var(--font-mono)">${firstYear}</text>
        <text x="${cw-pad.r}" y="${ch-4}" fill="#64748b" font-size="8" text-anchor="end" font-family="var(--font-mono)">${lastYear}+</text>
        <text x="${pad.l}" y="12" fill="#e2e8f0" font-size="8" font-family="var(--font-mono)">● Actual (bbl/mo)</text>
        ${fits.map((f, i) => `<text x="${pad.l + 120 + i*120}" y="12" fill="${f.color}" font-size="8" font-family="var(--font-mono)">${f === bestFit ? "▬" : "┄"} ${f.type}</text>`).join("")}
      </svg>`;
    
    statCards = `
      <div class="flex gap-12" style="margin-top:10px">
        <div class="stat-card"><div class="stat-label">Best Fit</div><div class="stat-value" style="color:${bestFit.color};font-size:14px">${bestFit.type}</div><div class="stat-sub">R² = ${bestFit.r2.toFixed(3)}</div></div>
        <div class="stat-card"><div class="stat-label">IP Rate</div><div class="stat-value" style="color:var(--green)">${bestFit.qi}<span class="stat-unit">bbl/mo</span></div></div>
        <div class="stat-card"><div class="stat-label">Di (annual)</div><div class="stat-value" style="color:var(--red)">${bestFit.DiAnnual.toFixed(1)}<span class="stat-unit">%</span></div></div>
        <div class="stat-card"><div class="stat-label">EUR (best fit)</div><div class="stat-value" style="color:var(--blue)">${bestFit.eur}<span class="stat-unit">MBO</span></div></div>
        <div class="stat-card"><div class="stat-label">Data Points</div><div class="stat-value" style="color:var(--text)">${dcaState.prodData.length}<span class="stat-unit">mo</span></div></div>
      </div>`;
  } else {
    // Fallback — synthetic curve (original behavior)
    const ip = well?.ip || 500;
    const decline = well?.decline || 0.5;
    const data = []; let cumSum = 0;
    for (let m = 0; m < 120; m++) { const rate = ip * Math.exp(-decline * m / 12); cumSum += rate * 30; data.push({ month: m, rate, cum: cumSum / 1000 }); }
    const maxR = Math.max(...data.map(d => d.rate));
    const ratePts = data.map(d => `${pad.l+(d.month/119)*w},${pad.t+h-(d.rate/maxR)*h}`).join(" ");
    const grid = [0,0.25,0.5,0.75,1].map(f => `
      <line x1="${pad.l}" y1="${pad.t+h*(1-f)}" x2="${cw-pad.r}" y2="${pad.t+h*(1-f)}" stroke="#1a2332" stroke-dasharray="2,4" />
      <text x="${pad.l-6}" y="${pad.t+h*(1-f)+3}" fill="#64748b" font-size="8" text-anchor="end" font-family="var(--font-mono)">${Math.round(maxR*f)}</text>
    `).join("");
    chartSVG = `<svg viewBox="0 0 ${cw} ${ch}" class="chart-svg">
      <defs><linearGradient id="rg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e8a838" stop-opacity="0.3"/><stop offset="100%" stop-color="#e8a838" stop-opacity="0"/></linearGradient></defs>
      ${grid}
      <polygon points="${pad.l},${pad.t+h} ${ratePts} ${pad.l+w},${pad.t+h}" fill="url(#rg)" />
      <polyline points="${ratePts}" fill="none" stroke="#e8a838" stroke-width="2" />
    </svg>`;
    statCards = `<div class="flex gap-12" style="margin-top:10px">
      <div class="stat-card"><div class="stat-label">IP Rate</div><div class="stat-value" style="color:var(--green)">${ip}<span class="stat-unit">bbl/d</span></div></div>
      <div class="stat-card"><div class="stat-label">Di (annual)</div><div class="stat-value" style="color:var(--red)">${(decline*100).toFixed(0)}<span class="stat-unit">%</span></div></div>
      <div class="stat-card"><div class="stat-label">Est. EUR</div><div class="stat-value" style="color:var(--blue)">${data[data.length-1].cum.toFixed(0)}<span class="stat-unit">MBO</span></div></div>
    </div>`;
  }
  
  // Fit comparison table
  const fitTable = fits && fits.length > 0 ? `
    <div style="margin-top:12px">
      <div style="font-size:10px;font-weight:700;color:var(--text-dim);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">Model Comparison</div>
      <table style="width:100%;font-size:10px;font-family:var(--font-mono);border-collapse:collapse">
        <tr style="color:var(--text-dim);border-bottom:1px solid var(--border)"><td style="padding:4px 0">Model</td><td>qi</td><td>Di</td>${fits.some(f=>f.b!==undefined)?'<td>b</td>':''}<td>EUR</td><td>R²</td></tr>
        ${fits.map(f => `<tr style="border-bottom:1px solid var(--border)">
          <td style="padding:4px 0;color:${f.color};font-weight:600">${f.type}${f === bestFit ? ' ★' : ''}</td>
          <td>${f.qi}</td>
          <td>${f.DiAnnual.toFixed(1)}%</td>
          ${fits.some(ff=>ff.b!==undefined)?`<td>${f.b !== undefined ? f.b : '—'}</td>`:''}
          <td style="color:var(--blue)">${f.eur} MBO</td>
          <td style="color:${f.r2>0.8?'var(--green)':f.r2>0.5?'var(--accent)':'var(--red)'}">${f.r2.toFixed(3)}</td>
        </tr>`).join("")}
      </table>
    </div>` : "";
  
  // Type curve section
  const tc = dcaState.typeCurveData;
  let typeCurveHTML = "";
  if (tc && !tc.error && tc.p50.length > 0) {
    const maxTC = Math.max(...tc.p90) * 1.1;
    const tcW = 250, tcH = 120, tcPad = { t: 14, r: 8, b: 16, l: 35 };
    const tw = tcW - tcPad.l - tcPad.r, th = tcH - tcPad.t - tcPad.b;
    const makePts = (arr) => arr.map((v, i) => `${tcPad.l + (i/(arr.length-1))*tw},${tcPad.t + th - (v/maxTC)*th}`).join(" ");
    typeCurveHTML = `
      <div class="card" style="margin-top:8px">
        <div style="font-size:11px;font-weight:700;margin-bottom:2px;color:var(--cyan)">Type Curve — ${tc.formation} · ${tc.county} Co.</div>
        <div style="font-size:9px;color:var(--text-dim);font-family:var(--font-mono);margin-bottom:6px">${tc.wellCount} wells aggregated · P10/P50/P90</div>
        <svg viewBox="0 0 ${tcW} ${tcH}" style="width:100%;display:block">
          <polygon points="${tcPad.l},${tcPad.t+th} ${makePts(tc.p10)} ${tcPad.l+tw},${tcPad.t+th}" fill="rgba(34,211,238,0.06)" />
          <polygon points="${tcPad.l},${tcPad.t+th} ${makePts(tc.p90)} ${tcPad.l+tw},${tcPad.t+th}" fill="rgba(34,211,238,0.06)" />
          <polyline points="${makePts(tc.p10)}" fill="none" stroke="var(--cyan)" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.5" />
          <polyline points="${makePts(tc.p90)}" fill="none" stroke="var(--cyan)" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.5" />
          <polyline points="${makePts(tc.p50)}" fill="none" stroke="var(--cyan)" stroke-width="1.5" />
          <text x="${tcPad.l}" y="${tcH-2}" fill="var(--text-muted)" font-size="7" font-family="var(--font-mono)">Mo 1</text>
          <text x="${tcW-tcPad.r}" y="${tcH-2}" fill="var(--text-muted)" font-size="7" text-anchor="end" font-family="var(--font-mono)">Mo ${tc.months}</text>
          <text x="${tcW-tcPad.r}" y="${tcPad.t+6}" fill="var(--cyan)" font-size="7" text-anchor="end" font-family="var(--font-mono)">P50: ${Math.round(tc.p50[0])} → ${Math.round(tc.p50[tc.p50.length-1])} bbl/mo</text>
        </svg>
      </div>`;
  } else if (tc && tc.error) {
    typeCurveHTML = `<div class="card" style="margin-top:8px"><div style="font-size:10px;color:var(--text-dim);font-family:var(--font-mono)">${tc.error}</div></div>`;
  }
  
  // AI analysis section
  const aiSection = dcaState.aiAnalysis ? `
    <div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border)">
      <div style="font-size:10px;font-weight:700;color:var(--cyan);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">🧠 AI Decline Interpretation</div>
      <div style="font-size:11px;color:var(--text);font-family:var(--font-mono);line-height:1.7;white-space:pre-wrap;max-height:300px;overflow-y:auto">${dcaState.aiAnalysis}</div>
    </div>` : "";
  
  const offsetWells = well ? state.wells.filter(w2 => w2.id !== well.id).map(w2 => ({...w2, dist: Math.hypot(w2.lng-well.lng, w2.lat-well.lat)})).sort((a,b) => a.dist-b.dist).slice(0,6) : state.wells.slice(0,6);
  
  // Load data button
  const loadBtn = well && well.isReal && well.leaseNumber && !hasProdData
    ? `<div style="margin-top:10px;font-size:10px;color:var(--text-dim);font-family:var(--font-mono)">⏳ Loading production data...</div>`
    : "";
  
  const analyzeBtn = hasProdData && fits && fits.length > 0
    ? `<button class="btn btn-cyan" style="margin-top:8px;width:100%" onclick="runDCAAnalysis(state.selectedWell, dcaState.prodData, dcaState.fits)" ${dcaState.analyzing ? 'disabled' : ''}>${dcaState.analyzing ? '⏳ AI analyzing decline...' : '🧠 AI Analyze This Decline'}</button>`
    : "";
  
  const typeCurveBtn = well && well.isReal
    ? `<button class="btn" style="margin-top:6px;width:100%;font-size:9px" onclick="generateTypeCurve()" ${dcaState.generatingTypeCurve ? 'disabled' : ''}>${dcaState.generatingTypeCurve ? '⏳ Building type curve...' : '📊 Generate Type Curve — ' + (well.formation || 'Unknown') + ' · ' + (well.county || '') + ' Co.'}</button>`
    : "";
  
  el.innerHTML = `
    <div class="flex gap-16">
      <div class="flex-1 card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <div style="font-size:13px;font-weight:700">Decline Curve Analysis${well ? ` <span style="color:var(--accent)">— ${well.lease}</span>` : ''}</div>
          ${hasProdData ? '<span style="font-size:9px;font-family:var(--font-mono);color:var(--green);background:var(--green)15;padding:2px 6px;border-radius:3px">LIVE RRC DATA</span>' : well?.isReal ? '<span style="font-size:9px;font-family:var(--font-mono);color:var(--text-dim)">Click Load to fetch production data</span>' : '<span style="font-size:9px;font-family:var(--font-mono);color:var(--text-dim)">SYNTHETIC</span>'}
        </div>
        ${chartSVG}
        ${statCards}
        ${fitTable}
        ${loadBtn}
        ${analyzeBtn}
        ${aiSection}
      </div>
      <div style="width:270px">
        <div class="card" style="margin-bottom:8px">
          <div style="font-size:12px;font-weight:700;margin-bottom:8px">Offset Wells (nearest)</div>
          ${offsetWells.map(ow => `
            <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="dcaState.prodData=null;dcaState.fits=null;dcaState.aiAnalysis=null;state.selectedWell=state.wells.find(x=>x.id==='${ow.id}');render()">
              <span style="font-size:10px;color:var(--text);font-family:var(--font-mono)">${ow.lease.substring(0,22)}</span>
              <span style="font-size:10px;color:var(--green);font-family:var(--font-mono)">${ow.ip} bbl/d</span>
            </div>
          `).join("")}
        </div>
        ${typeCurveBtn}
        ${typeCurveHTML}
      </div>
    </div>
  `;
}

      `<button class="risk-segment" style="background:${i<=v?colors[v-1]:'var(--border)'}" onclick="state.riskScores.${cat.key}=${i};render()"></button>`

            <div style="width:70px;height:70px;border-radius:50%;background:conic-gradient(${g>10?'var(--green)':g>3?'var(--accent)':'var(--red)'} ${g*3.6}deg, var(--border) 0deg);display:flex;align-items:center;justify-content:center">

          <tr style="border-top:1px solid var(--border)"><td style="padding:5px 0;font-weight:600">NPV</td><td style="color:var(--red)">$${(mc.p10.npv/1e6).toFixed(1)}M</td><td style="color:var(--accent)">$${(mc.p50.npv/1e6).toFixed(1)}M</td><td style="color:var(--green)">$${(mc.p90.npv/1e6).toFixed(1)}M</td><td style="color:var(--blue)">$${(mc.mean.npv/1e6).toFixed(1)}M</td></tr>
          <tr style="border-top:1px solid var(--border)"><td style="padding:5px 0;font-weight:600">EUR</td><td style="color:var(--red)">${mc.p10.eur?.toFixed(0)||"—"}</td><td style="color:var(--accent)">${mc.p50.eur?.toFixed(0)||"—"}</td><td style="color:var(--green)">${mc.p90.eur?.toFixed(0)||"—"}</td><td style="color:var(--blue)">${mc.mean.eur?.toFixed(0)||"—"} MBO</td></tr>

function histogramSVG(dist, w, h) {
  if (!dist || !dist.length) return "";
  const bins = 40;
  const min = Math.min(...dist), max = Math.max(...dist);
  const range = max - min || 1;
  const bw = range / bins;
  const counts = new Array(bins).fill(0);
  dist.forEach(v => { const idx = Math.min(Math.floor((v - min) / bw), bins - 1); counts[idx]++; });
  const mc = Math.max(...counts);
  const pad = { t: 8, r: 16, b: 22, l: 16 };
  const iw = w - pad.l - pad.r, ih = h - pad.t - pad.b;
  const barW = iw / bins;
  
  let bars = counts.map((c, i) => {
    const x = pad.l + i * barW;
    const bh = (c / mc) * ih;
    const val = min + i * bw;
    return `<rect x="${x+1}" y="${pad.t+ih-bh}" width="${barW-2}" height="${bh}" fill="${val>=0?'#34d399':'#f87171'}" opacity="0.6" rx="1" />`;
  }).join("");
  
  const zeroX = min < 0 && max > 0 ? pad.l + ((0 - min) / range) * iw : -1;
  const zeroLine = zeroX > 0 ? `<line x1="${zeroX}" y1="${pad.t}" x2="${zeroX}" y2="${pad.t+ih}" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3,3" />` : '';
  
  return `${bars}${zeroLine}
    <text x="${pad.l}" y="${h-3}" fill="#64748b" font-size="9" font-family="var(--font-mono)">$${(min/1e6).toFixed(1)}M</text>
    <text x="${w-pad.r}" y="${h-3}" fill="#64748b" font-size="9" text-anchor="end" font-family="var(--font-mono)">$${(max/1e6).toFixed(1)}M</text>`;
}

          <div style="font-size:11px;font-weight:700;margin-bottom:8px;color:var(--accent);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.5px">Wells by Formation/Field</div>
          <div style="font-size:9px;color:var(--text-dim);font-family:var(--font-mono);margin-bottom:6px">From ${state.wells.length.toLocaleString()} loaded wells</div>
          ${fmCountRows}
        </div>` : ""}
      </div>
      <!-- Detail cards -->
      <div class="flex-1" style="max-height:calc(100vh - 260px);overflow-y:auto;padding-right:4px">
        ${detailCards}
        ${isNCTX ? `
        <div class="card" style="border-left:3px solid var(--text-muted)">
          <div style="font-size:12px;font-weight:700;margin-bottom:6px">Structural Context</div>
          <div style="font-size:10px;color:var(--text);font-family:var(--font-mono);line-height:1.8">
            <div>• Eastern Shelf of Midland Basin / Bend Arch trend</div>
            <div>• Gentle regional dip west/northwest</div>
            <div>• Anticlinal closures from Pennsylvanian Ouachita Orogeny</div>
            <div>• Red River Uplift influences northern Wichita County</div>
            <div>• Wichita Falls–Electra anticline is the dominant feature</div>
            <div>• Fault-bounded traps common in Strawn and deeper intervals</div>
          </div>
        </div>
        <div class="card" style="border-left:3px solid var(--cyan)">
          <div style="font-size:12px;font-weight:700;margin-bottom:6px">Quick Economics by Formation</div>
          <div style="font-size:10px;color:var(--text-dim);font-family:var(--font-mono);margin-bottom:6px">Typical well costs for N. Central TX conventional</div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">
            ${[
              ["Cisco/Gunsight", "$200–400K", "700–1,900 ft"],
              ["Canyon/Caddo", "$350–600K", "3,000–4,800 ft"],
              ["Strawn", "$400–700K", "3,500–5,500 ft"],
              ["Bend/Ellenburger", "$600K–1.2M", "4,500–7,000 ft"],
            ].map(([fm, cost, depth]) => `
              <div style="background:var(--bg-input);border-radius:6px;padding:8px">
                <div style="font-size:10px;font-weight:600;color:var(--text);margin-bottom:2px">${fm}</div>
                <div style="font-size:11px;font-weight:700;color:var(--green);font-family:var(--font-mono)">${cost}</div>
                <div style="font-size:9px;color:var(--text-muted);font-family:var(--font-mono)">${depth}</div>
              </div>
            `).join("")}
          </div>
        </div>` : ""}
      </div>
    </div>
  `;
}

// ============ INIT ============
async function init() {
  // Try Supabase first
  const hasRealData = await initSupabase();
  
  if (hasRealData) {
    const realWells = await loadSupabaseWells(state.basin);
    if (realWells && realWells.length > 0) {
      state.wells = realWells;
      console.log(`✅ Loaded ${realWells.length} real wells from Supabase`);
    } else {
      state.wells = generateWells(state.basin);
    }
    // Fetch data freshness (non-blocking)
    fetchDataFreshness();
  } else {
    state.wells = generateWells(state.basin);
  }
  
  render();
}

async function fetchDataFreshness() {
  try {
    const r = await supabaseClient
      .from("ps_wells")
      .select("updated_at")
      .or("district.in.(09,9,7B),district.is.null")
      .order("updated_at", { ascending: false })
      .limit(1);
    if (r.data && r.data.length > 0) {
      const d = new Date(r.data[0].updated_at);
      state.lastRefreshDate = d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
    }
    const { count } = await supabaseClient
      .from("ps_wells")
      .select("*", { count: "exact", head: true })
      .or("district.in.(09,9,7B),district.is.null");
    if (count) state.totalWellCount = count.toLocaleString();
    render();
  } catch (e) { console.log("Freshness check:", e.message); }
}

init();
</script>
</body>
</html>
